name: KiTS Auto Sprint Runner

on:
  schedule:
    # Every 4 hours. Adjust or comment out to control costs.
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      sprint_id:
        description: 'Force a specific sprint (e.g. "1.1"). Leave blank for next pending.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — show next sprint but do not execute or commit'
        type: boolean
        required: false
        default: false

# Prevent overlapping runs — each run must complete before the next starts
concurrency:
  group: kits-auto-sprint
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  auto-sprint:
    name: Execute Next Sprint
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 10

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Configure Git
        run: |
          git config user.name "KiTS Auto Agent"
          git config user.email "kits.tech.co@gmail.com"

      - name: Check for pending sprints
        id: check
        run: |
          if [ ! -f docs/MASTER_PLAN.md ]; then
            echo "::error::docs/MASTER_PLAN.md not found"
            exit 1
          fi
          if grep -qE '^\s*### Sprint.*\[PENDING\]' docs/MASTER_PLAN.md; then
            SPRINT=$(grep -E '^\s*### Sprint.*\[PENDING\]' docs/MASTER_PLAN.md | head -1 \
              | sed 's/.*### //' | sed 's/ \[PENDING\]//')
            echo "has_work=true"  >> "$GITHUB_OUTPUT"
            echo "sprint_name=$SPRINT" >> "$GITHUB_OUTPUT"
            echo "Next sprint: $SPRINT"
          else
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            echo "No pending sprints."
          fi

      - name: Dry run preview
        if: inputs.dry_run == true && steps.check.outputs.has_work == 'true'
        run: |
          echo "=== DRY RUN — next sprint preview ==="
          grep -A 40 '\[PENDING\]' docs/MASTER_PLAN.md | head -45

      - name: Execute sprint (Attempt 1)
        id: run1
        if: steps.check.outputs.has_work == 'true' && inputs.dry_run != true
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_USE_LOCAL_MODE: 'true'
        run: |
          set -o pipefail
          bash scripts/auto-sprint.sh "${{ inputs.sprint_id }}" 2>&1 | tee sprint_run.log; exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code

      - name: Retry sprint (Attempt 2)
        id: run2
        if: |
          steps.check.outputs.has_work == 'true' &&
          inputs.dry_run != true &&
          steps.run1.outcome == 'failure'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_USE_LOCAL_MODE: 'true'
        run: |
          echo "::warning::Attempt 1 failed. Retrying in 60s..."
          sleep 60
          set -o pipefail
          bash scripts/auto-sprint.sh "${{ inputs.sprint_id }}" 2>&1 | tee -a sprint_run.log; exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code

      - name: Determine success
        id: result
        if: always()
        run: |
          if [ "${{ steps.run1.outcome }}" == "success" ] || \
             [ "${{ steps.run2.outcome }}" == "success" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: |
          steps.result.outputs.success == 'true' &&
          inputs.dry_run != true
        run: |
          git add -A
          # Never commit secrets
          git reset -- .env .env.local .env.production 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: ${{ steps.check.outputs.sprint_name }} [skip ci]"
          fi

      - name: Open failure issue
        if: |
          steps.result.outputs.success == 'false' &&
          steps.check.outputs.has_work == 'true' &&
          inputs.dry_run != true
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'sprint-runner-failure'
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🤖 Sprint runner failed — ${new Date().toISOString().split('T')[0]}`,
                body: `Sprint runner failed twice.\n\n**Run:** ${runUrl}\n**Sprint:** ${{ steps.check.outputs.sprint_name }}\n\nCheck \`ANTHROPIC_API_KEY\` is valid, review \`docs/MASTER_PLAN.md\` for blocked tasks, re-run manually if needed.`,
                labels: ['sprint-runner-failure', 'automated']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing — [run #${{ github.run_number }}](${runUrl})`
              });
            }

      - name: Close failure issue on recovery
        if: steps.result.outputs.success == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'sprint-runner-failure'
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Recovered on run #${{ github.run_number }}.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed'
              });
            }

      - name: Summary
        if: always()
        run: |
          echo "## KiTS Sprint Run" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Sprint | ${{ steps.check.outputs.sprint_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | ${{ steps.result.outputs.success == 'true' && '✅ Success' || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Time | $(date -u) |" >> "$GITHUB_STEP_SUMMARY"

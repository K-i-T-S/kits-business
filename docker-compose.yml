services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      - VITE_USE_LOCAL_MODE=false
      - NODE_ENV=development
      - API_URL=http://backend:3001
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true
    depends_on:
      - db
      - backend
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=business_terminal
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - .:/app
      - /app/node_modules
    command: node server/index.js
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: business-terminal-db
    environment:
      - POSTGRES_DB=business_terminal
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
